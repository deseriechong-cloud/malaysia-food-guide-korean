function filter(tag,btn){
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render(tag);
}

function render(tag='all'){
  const f=tag==='all'?foods:
    tag==='premium'?foods.filter(x=>x.tier==='premium'):
    tag==='regular'?foods.filter(x=>x.tier==='regular'):
    tag==='street'?foods.filter(x=>x.tier==='street'):
    tag==='dessert'?foods.filter(x=>x.tier==='dessert'):
    tag==='meat'?foods.filter(x=>x.primary==='meat'):
    tag==='seafood'?foods.filter(x=>x.primary==='seafood'||x.tags.includes('seafood')):
    tag==='noodles'?foods.filter(x=>x.primary==='noodles'):
    foods.filter(x=>x.tags.includes(tag));

  const tiers=[
    {key:'premium',label:'고급 요리 — Premium splurge',items:f.filter(x=>x.tier==='premium')},
    {key:'regular',label:'일반 호커 — Everyday hawker classics',items:f.filter(x=>x.tier==='regular')},
    {key:'street',label:'길거리 & 아침 — Street & breakfast staples',items:f.filter(x=>x.tier==='street')},
    {key:'dessert',label:'디저트 & 과일 — Desserts & fruits',items:f.filter(x=>x.tier==='dessert')}
  ];

  const main=document.getElementById('main');
  main.innerHTML='';
  let any=false;

  tiers.forEach(tier=>{
    if(!tier.items.length) return;
    any=true;
    const sec=document.createElement('div');
    sec.className='section';
    sec.innerHTML=`<div class="tier-label">${tier.label}</div><div class="grid">${tier.items.map((f,i)=>card(f,tier.key,i)).join('')}</div>`;
    main.appendChild(sec);
  });

  if(!any){
    main.innerHTML='<p style="color:var(--color-text-secondary);font-size:14px;padding-top:1rem;">결과 없음 (No results)</p>';
  }
}

function card(f,tierKey,i){
  const bc=tierKey==='premium'?'bp':tierKey==='regular'?'br':tierKey==='street'?'bs':'bd';
  const bl=tierKey==='premium'?'고급':tierKey==='regular'?'일반':tierKey==='street'?'길거리':'디저트';
  const imgHtml=f.img
    ?`<img src="${f.img}" alt="${f.name}" onerror="this.parentElement.innerHTML='<div class=\\'fallback\\'><span class=\\'emo\\'>${f.emo}</span><a href=\\'${f.src}\\' target=\\'_blank\\'>구글 이미지 보기</a></div>'">`
    :`<div class="fallback"><span class="emo">${f.emo}</span><a href="${f.src}" target="_blank">구글 이미지 보기</a></div>`;
  return `<div class="card">
    <div class="card-img">${imgHtml}<span class="badge ${bc}">${bl}</span></div>
    <div class="card-body">
      <div class="food-name-kr">${f.name}</div>
      <div class="food-name-en">${f.en}</div>
      <button class="xbtn" onclick="toggle('${tierKey}${i}',this)">+ 자세히 보기 (details)</button>
      <div class="details" id="d${tierKey}${i}">
        <div class="dr"><span class="dl">재료</span><div><div class="dv">${f.ing}</div><div class="dv-en">${f.ing_en}</div></div></div>
        <div class="dr"><span class="dl">주의</span><div><div class="av">${f.avoid}</div><div class="dv-en">${f.avoid_en}</div></div></div>
        <div class="dr"><span class="dl">사진</span><div class="dv"><a href="${f.src}" target="_blank" style="color:var(--color-text-info);">구글 이미지 검색 →</a></div></div>
      </div>
    </div>
  </div>`;
}

function toggle(id,btn){
  const d=document.getElementById('d'+id);
  const open=d.classList.toggle('open');
  btn.textContent=open?'− 닫기 (close)':'+ 자세히 보기 (details)';
}

render('all');
</script>
